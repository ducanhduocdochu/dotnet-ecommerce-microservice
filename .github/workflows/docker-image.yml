name: Build & Push changed services

on:
  push:
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            services:
              - 'service/**'

      - name: Extract changed services
        id: set-services
        run: |
          SERVICES=$(echo "${{ steps.changed.outputs.services_files }}" \
          | awk -F/ '/^service\// {print $2}' \
          | sort -u)
    
          if [ -z "$SERVICES" ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' $SERVICES | jq -R . | jq -s -c .)
            echo "services=$JSON" >> $GITHUB_OUTPUT
          fi

          echo "Changed services:"
          echo "$SERVICES"
          echo ${{ secrets.DOCKERHUB_USERNAME }}
          echo ${{ secrets.DOCKERHUB_TOKEN }}

